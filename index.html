<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Prevent flash of wrong theme — set data-theme before CSS loads
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
        // else keep the default "dark" from the html attribute
      })();
    </script>

    <!-- Title & Description -->
    <title>FounderTrack — Kenesis Vision</title>
    <meta name="description" content="Workspace management and team tracking platform. Track attendance, daily reports, leave, and team analytics." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Theme Color (matches dark mode accent) -->
    <meta name="theme-color" content="#d4930a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#c07b08" media="(prefers-color-scheme: light)" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="FounderTrack — Kenesis Vision" />
    <meta property="og:description" content="Workspace management and team tracking platform" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foundertrack.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FounderTrack — Kenesis Vision" />
    <meta name="twitter:description" content="Workspace management and team tracking platform" />

    <!-- Misc -->
    <meta name="application-name" content="FounderTrack" />
    <meta name="apple-mobile-web-app-title" content="FounderTrack" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO: Robots directive -->
    <meta name="robots" content="index, follow" />

    <!-- SEO: Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FounderTrack",
      "description": "Workspace management and team tracking platform",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
